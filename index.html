<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherNow — INM420 REST API Assignment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="wrapper">

    <!-- page header / title -->
    <header class="header">
      <p class="eyebrow">inm420 — rest api assignment</p>
      <h1>Weather<span>Now</span></h1>
      <p>Pick a city or type your own, then fetch live weather data.</p>
    </header>

    <!-- user input controls: dropdown of preset cities + free text input -->
    <section class="controls" aria-label="weather search controls">

      <label class="field-label" for="city-select">choose a preset city</label>
      <select id="city-select">
        <option value="">— pick a location —</option>
        <option value="Toronto">Toronto, Canada</option>
        <option value="New York">New York, USA</option>
        <option value="London">London, UK</option>
        <option value="Tokyo">Tokyo, Japan</option>
        <option value="Dubai">Dubai, UAE</option>
      </select>

      <div class="divider"><span>or</span></div>

      <label class="field-label" for="city-input">type any city name</label>
      <input
        type="text"
        id="city-input"
        placeholder="e.g. Almaty, Paris, Cairo…"
        autocomplete="off"
      />

      <button class="btn" id="fetch-btn" type="button">
        <span class="btn-inner">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-label">Get Weather</span>
        </span>
      </button>
    </section>

    <!-- error feedback, hidden unless a request fails -->
    <p class="error-msg" id="error-msg" role="alert"></p>

    <!-- api result, populated dynamically via JS DOM manipulation -->
    <section class="result" id="result" aria-live="polite">
      <div class="result-banner" id="result-banner">
        <img class="weather-icon" id="weather-icon" src="" alt="" />
        <div class="banner-text">
          <p class="city" id="city-name"></p>
          <p class="country" id="country-name"></p>
          <p class="condition" id="condition-text"></p>
        </div>
      </div>
      <div class="stats">
        <article class="stat">
          <p class="stat-label">temperature</p>
          <p class="stat-value" id="temp-c">—<span class="unit">°C</span></p>
        </article>
        <article class="stat">
          <p class="stat-label">feels like</p>
          <p class="stat-value" id="feels-like">—<span class="unit">°C</span></p>
        </article>
        <article class="stat">
          <p class="stat-label">humidity</p>
          <p class="stat-value" id="humidity">—<span class="unit">%</span></p>
        </article>
        <article class="stat">
          <p class="stat-label">wind speed</p>
          <p class="stat-value" id="wind-speed">—<span class="unit">km/h</span></p>
        </article>
      </div>
    </section>

    <footer class="footer">
      <p>powered by <a href="https://www.weatherapi.com/" target="_blank" rel="noopener">weatherapi.com</a></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
