<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App - INM420 Rest API Assignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Current Weather</h1>
    <p>Select a city from the list, or type your own city name below.</p>

    <!-- search controls -->
    <section class="search-box">

      <label for="city-select">Select a city:</label>
      <select id="city-select">
        <option value="">-- choose a city --</option>
        <option value="Toronto">Toronto</option>
        <option value="New York">New York</option>
        <option value="London">London</option>
        <option value="Tokyo">Tokyo</option>
        <option value="Dubai">Dubai</option>
      </select>

      <p>or</p>

      <label for="city-input">Type a city name:</label>
      <input type="text" id="city-input" placeholder="e.g. Almaty">

      <button id="search-btn">Get Weather</button>

    </section>

    <!-- error message, hidden until something goes wrong -->
    <p id="error-message" class="error"></p>

    <!-- weather result, filled in by script.js -->
    <section id="weather-result" class="result">
      <h2 id="city-name"></h2>
      <p id="country-name"></p>
      <img id="weather-icon" src="" alt="">
      <p id="condition-text"></p>

      <ul class="stats-list">
        <li>Temperature: <span id="temp-c"></span> °C</li>
        <li>Feels Like: <span id="feels-like"></span> °C</li>
        <li>Humidity: <span id="humidity"></span> %</li>
        <li>Wind Speed: <span id="wind-speed"></span> km/h</li>
      </ul>
    </section>

    <footer>
      <p>Data from <a href="https://www.weatherapi.com/" target="_blank">WeatherAPI.com</a></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
